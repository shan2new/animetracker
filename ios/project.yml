name: AniTrack
options:
  bundleIdPrefix: com.anitrack
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_LANGUAGE: en
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Set SWIFT_STRICT_CONCURRENCY to "complete" once you have validated the build.
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  Clerk:
    url: https://github.com/clerk/clerk-ios
    # Pinned to the latest release at authoring time. Bump as desired.
    from: "1.2.4"

targets:
  AniTrack:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    # XcodeGen has no separate `resources:` key — resources are `sources` entries it
    # auto-categorizes by file type into the resources build phase.
    sources:
      - path: Sources
      # Types shared with the widget extension (Live Activity attributes) — the file must be a
      # member of both targets so ActivityKit's app/widget halves agree on the payload.
      - path: Shared
      - path: Resources/Assets.xcassets
      # Bundled Outfit font weights (registered via UIAppFonts below). XcodeGen categorizes
      # the .ttf files into the resources build phase automatically.
      - path: Resources/Fonts
      # iOS 26 layered app icon (Icon Composer). `type: file` keeps the .icon package as a
      # single reference (not expanded into icon.json/Assets) so actool processes it.
      - path: Resources/AppIcon.icon
        type: file
        buildPhase: resources
    dependencies:
      # The clerk-ios package vends two products: ClerkKit (core) and ClerkKitUI (prebuilt views).
      - package: Clerk
        product: ClerkKit
      - package: Clerk
        product: ClerkKitUI
      # Widget extension hosting the airing-countdown Live Activity (embedded into PlugIns).
      - target: AniTrackWidgets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: AniTrack
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        # Bundled Outfit weights (files live in Resources/Fonts). Filenames only — XcodeGen
        # flattens the folder into the bundle root.
        UIAppFonts:
          - Outfit-Light.ttf
          - Outfit-Regular.ttf
          - Outfit-Medium.ttf
          - Outfit-SemiBold.ttf
          - Outfit-Bold.ttf
        # Connecting to a server on the local network by private IP requires this
        # permission string (iOS shows a one-time "find devices on your network" prompt;
        # without the key the connection to a 192.168.x.x address fails silently).
        NSLocalNetworkUsageDescription: "AniTrack connects to your AniTrack server running on your local network."
        # Production backend is HTTPS (anime.cognipin.com), so ATS needs no cleartext
        # exception for it. NSAllowsLocalNetworking is kept so pointing API_BASE_URL back
        # at a local/LAN dev server (plain http) still works without re-enabling arbitrary loads.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Lock-screen / Dynamic Island airing countdown (AiringLiveActivityManager).
        NSSupportsLiveActivities: true
        # === FILL THESE IN ===
        # Your Clerk publishable key (pk_test_… / pk_live_…). Leave the placeholder
        # to run in dev-bypass mode against the local backend.
        ClerkPublishableKey: "$(CLERK_PUBLISHABLE_KEY)"
        # Backend base URL. Defaults to the local dev server.
        APIBaseURL: "$(API_BASE_URL)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anitrack.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        # Placeholders read by Info.plist above. Override per-config or in an xcconfig.
        CLERK_PUBLISHABLE_KEY: "pk_test_bGVnaWJsZS1nb2JibGVyLTU3LmNsZXJrLmFjY291bnRzLmRldiQ"
        # Public HTTPS backend (self-hosted on the Mac mini, fronted at this domain).
        # For local development, override with a LAN URL such as
        # "http://Shantanus-MacBook-Air.local:8787" (NSAllowsLocalNetworking permits it).
        API_BASE_URL: "https://anime.cognipin.com"
        # === SIGNING ===
        DEVELOPMENT_TEAM: YLPZXZS2F4
        CODE_SIGN_STYLE: Automatic

  AniTrackWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Widgets
      - path: Shared
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: AniTrack
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anitrack.app.widgets
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: YLPZXZS2F4
        CODE_SIGN_STYLE: Automatic
